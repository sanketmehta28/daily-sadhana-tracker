<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sadhana — Sacred Routine Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --saffron: #E8791A;
    --deep-maroon: #5C1A1A;
    --gold: #C9922A;
    --warm-cream: #FDF6EC;
    --lotus-pink: #D4867A;
    --smoke: #7A6A5A;
    --earth: #3D2B1F;
    --light-gold: #F5DFA0;
    --completed: #4A7C59;
    --pending: #C25B2A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--earth);
    font-family: 'DM Sans', sans-serif;
    color: var(--warm-cream);
    min-height: 100vh;
  }

  /* Mandala background */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(201,146,42,0.07) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid rgba(201,146,42,0.3);
    margin-bottom: 28px;
  }

  .om-symbol {
    font-size: 2.5rem;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(201,146,42,0.5);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(201,146,42,0.4); }
    50% { text-shadow: 0 0 35px rgba(232,121,26,0.7), 0 0 60px rgba(201,146,42,0.3); }
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--light-gold);
    letter-spacing: 1px;
  }

  .header p {
    color: var(--smoke);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .date-strip {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 14px;
    font-size: 0.82rem;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* Week Nav */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    background: rgba(201,146,42,0.07);
    border: 1px solid rgba(201,146,42,0.2);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .week-nav button {
    background: none;
    border: 1px solid rgba(201,146,42,0.3);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .week-nav button:hover {
    background: rgba(201,146,42,0.15);
  }

  .week-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--light-gold);
    font-style: italic;
  }

  /* Weekly Summary Bar */
  .weekly-summary {
    background: linear-gradient(135deg, rgba(92,26,26,0.6), rgba(61,43,31,0.8));
    border: 1px solid rgba(201,146,42,0.25);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    text-align: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 600;
    line-height: 1;
  }

  .stat-number.completed { color: #6FCF97; }
  .stat-number.pending { color: var(--lotus-pink); }
  .stat-number.total { color: var(--gold); }

  .stat-label {
    font-size: 0.72rem;
    color: var(--smoke);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* Progress bar */
  .progress-wrap {
    grid-column: 1 / -1;
    margin-top: 4px;
  }

  .progress-track {
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--saffron));
    border-radius: 100px;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-size: 0.75rem;
    color: var(--smoke);
    text-align: right;
    margin-top: 5px;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 22px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(201,146,42,0.2);
    cursor: pointer;
    font-size: 0.78rem;
    text-align: center;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
    color: var(--smoke);
    min-width: 54px;
  }

  .day-tab .day-name {
    display: block;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .day-tab .day-count {
    display: block;
    font-size: 0.68rem;
    margin-top: 2px;
    opacity: 0.7;
  }

  .day-tab.active {
    background: rgba(201,146,42,0.15);
    border-color: var(--gold);
    color: var(--light-gold);
  }

  .day-tab.today {
    border-color: var(--saffron);
  }

  .day-tab.fully-done {
    background: rgba(74,124,89,0.2);
    border-color: #6FCF97;
    color: #6FCF97;
  }

  /* Task list */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-style: italic;
  }

  .tasks-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .task-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,146,42,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: rgba(201,146,42,0.3);
    transition: background 0.3s;
  }

  .task-card:hover {
    background: rgba(201,146,42,0.08);
    border-color: rgba(201,146,42,0.3);
    transform: translateX(2px);
  }

  .task-card.done {
    background: rgba(74,124,89,0.1);
    border-color: rgba(111,207,151,0.2);
  }

  .task-card.done::before {
    background: #6FCF97;
  }

  .task-checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(201,146,42,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 0.75rem;
  }

  .task-card.done .task-checkbox {
    background: #6FCF97;
    border-color: #6FCF97;
    color: var(--earth);
  }

  .task-info { flex: 1; }

  .task-name {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--warm-cream);
    margin-bottom: 2px;
    transition: color 0.25s;
  }

  .task-card.done .task-name {
    color: rgba(253,246,236,0.5);
    text-decoration: line-through;
    text-decoration-color: rgba(111,207,151,0.4);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .task-time-input {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 0;
    outline: none;
    letter-spacing: 0.5px;
  }

  .task-time-input::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(2) hue-rotate(5deg);
    cursor: pointer;
    opacity: 0.7;
  }

  .task-emoji {
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  /* Alarm set badge */
  .alarm-badge {
    font-size: 0.65rem;
    background: rgba(232,121,26,0.2);
    color: var(--saffron);
    padding: 2px 7px;
    border-radius: 100px;
    border: 1px solid rgba(232,121,26,0.3);
    letter-spacing: 0.5px;
  }

  /* Set alarm button */
  .set-alarm-btn {
    background: none;
    border: 1px dashed rgba(201,146,42,0.3);
    color: var(--smoke);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .set-alarm-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--deep-maroon);
    border: 1px solid var(--gold);
    color: var(--light-gold);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.85rem;
    z-index: 100;
    opacity: 0;
    transition: all 0.35s ease;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Reset button */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
    border: none;
  }

  .btn-ghost {
    background: rgba(201,146,42,0.1);
    color: var(--gold);
    border: 1px solid rgba(201,146,42,0.3);
  }

  .btn-ghost:hover { background: rgba(201,146,42,0.2); }

  .btn-danger {
    background: rgba(194,91,42,0.15);
    color: var(--lotus-pink);
    border: 1px solid rgba(194,91,42,0.3);
  }

  .btn-danger:hover { background: rgba(194,91,42,0.25); }

  /* Divider */
  .divider {
    text-align: center;
    color: rgba(201,146,42,0.3);
    font-size: 1rem;
    letter-spacing: 12px;
    margin: 24px 0 20px;
  }

  /* Alarm modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: linear-gradient(135deg, #3D2B1F, #2A1810);
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--light-gold);
    margin-bottom: 6px;
  }

  .modal p {
    font-size: 0.8rem;
    color: var(--smoke);
    margin-bottom: 18px;
  }

  .modal input[type="time"] {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 8px;
    color: var(--light-gold);
    font-size: 1.1rem;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
    outline: none;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .modal-btns .btn { flex: 1; }

  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    color: var(--earth);
    font-weight: 600;
  }

  .btn-primary:hover { opacity: 0.9; }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.7rem; }
    .weekly-summary { grid-template-columns: 1fr 1fr; }
    .weekly-summary .progress-wrap { grid-column: 1 / -1; }
    .stat-number { font-size: 1.9rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <span class="om-symbol">🕉</span>
    <h1>Daily Sadhana</h1>
    <p>Sacred Routine · Weekly Tracker</p>
    <div class="date-strip">
      <span id="todayDate"></span>
    </div>
  </header>

  <!-- Week Nav -->
  <div class="week-nav">
    <button onclick="changeWeek(-1)">← Prev</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">Next →</button>
  </div>

  <!-- Weekly Summary -->
  <div class="weekly-summary">
    <div class="stat">
      <span class="stat-number total" id="statTotal">0</span>
      <span class="stat-label">Total Tasks<br>This Week</span>
    </div>
    <div class="stat">
      <span class="stat-number completed" id="statCompleted">0</span>
      <span class="stat-label">Completed ✓</span>
    </div>
    <div class="stat">
      <span class="stat-number pending" id="statPending">0</span>
      <span class="stat-label">Pending ○</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">0% this week</div>
    </div>
  </div>

  <!-- Day Tabs -->
  <div class="day-tabs" id="dayTabs"></div>

  <!-- Task List -->
  <p class="section-title" id="selectedDayLabel">Today's Sadhana</p>
  <div class="tasks-list" id="taskList"></div>

  <div class="divider">· · ·</div>

  <div class="actions">
    <button class="btn btn-ghost" onclick="markAllDone()">✓ Mark All Done</button>
    <button class="btn btn-danger" onclick="resetDay()">↺ Reset Day</button>
  </div>
</div>

<!-- Alarm Modal -->
<div class="modal-overlay" id="alarmModal">
  <div class="modal">
    <h3 id="modalTaskName">Set Reminder</h3>
    <p>Choose the time you want to be reminded for this practice daily.</p>
    <input type="time" id="modalTimeInput" />
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAlarmTime()">Set Reminder 🔔</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── TASKS ──────────────────────────────────────────────────────────────────
const TASKS = [
  { id: 1,  name: "Manifestation during Alpha Sleep",   emoji: "🌙", defaultTime: "05:30" },
  { id: 2,  name: "Wake Up with Mantra Chanting",       emoji: "🙏", defaultTime: "06:00" },
  { id: 3,  name: "Consume Ghee with Water",            emoji: "🫙", defaultTime: "06:15" },
  { id: 4,  name: "Eat Dry Fruits",                     emoji: "🌰", defaultTime: "06:20" },
  { id: 5,  name: "Brush with Dantmanjan",              emoji: "🪷", defaultTime: "06:30" },
  { id: 6,  name: "Sunlight for 15 Minutes",            emoji: "☀️", defaultTime: "06:45" },
  { id: 7,  name: "Bath & Diya Lighting",               emoji: "🪔", defaultTime: "07:10" },
  { id: 8,  name: "Om Chanting — 6 Minutes",            emoji: "🕉️", defaultTime: "07:30" },
  { id: 9,  name: "Kegel Exercise",                     emoji: "🧘", defaultTime: "07:40" },
  { id: 10, name: "Hanuman Chalisa & Bhairava Mantra",  emoji: "🔱", defaultTime: "07:50" },
];

// ── STATE ──────────────────────────────────────────────────────────────────
const WEEK_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEEK_DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let weekOffset = 0; // 0 = current week
let selectedDayIndex = new Date().getDay(); // 0=Sun

// Storage helpers
function storageKey(weekStart, dayIdx) {
  return `sadhana_${weekStart}_${dayIdx}`;
}

function getWeekStart(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const diff = today.getDate() - day;
  const sun = new Date(today.setDate(diff));
  sun.setDate(sun.getDate() + offset * 7);
  return sun.toISOString().split('T')[0];
}

function loadDayData(weekStart, dayIdx) {
  try {
    const raw = localStorage.getItem(storageKey(weekStart, dayIdx));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveDayData(weekStart, dayIdx, data) {
  try {
    localStorage.setItem(storageKey(weekStart, dayIdx), JSON.stringify(data));
  } catch {}
}

function loadAlarmTimes() {
  try {
    return JSON.parse(localStorage.getItem('sadhana_alarms') || '{}');
  } catch { return {}; }
}

function saveAlarmTimes(times) {
  try {
    localStorage.setItem('sadhana_alarms', JSON.stringify(times));
  } catch {}
}

function getDefaultDayData() {
  return TASKS.map(t => ({ id: t.id, done: false }));
}

// ── WEEK SUMMARY ────────────────────────────────────────────────────────────
function computeWeeklySummary(weekStart) {
  let completed = 0, total = 0;
  for (let d = 0; d < 7; d++) {
    const data = loadDayData(weekStart, d) || getDefaultDayData();
    total += data.length;
    completed += data.filter(t => t.done).length;
  }
  return { completed, total, pending: total - completed };
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function formatWeekLabel(weekStart) {
  const d = new Date(weekStart + 'T00:00:00');
  const end = new Date(d);
  end.setDate(d.getDate() + 6);
  const opts = { month: 'short', day: 'numeric' };
  return `${d.toLocaleDateString('en-IN', opts)} – ${end.toLocaleDateString('en-IN', opts)}`;
}

function render() {
  const today = new Date();
  const todayDayIdx = today.getDay();
  const weekStart = getWeekStart(weekOffset);

  // Header date
  document.getElementById('todayDate').textContent =
    today.toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Week nav
  document.getElementById('weekLabel').textContent = formatWeekLabel(weekStart);

  // Summary
  const { completed, total, pending } = computeWeeklySummary(weekStart);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCompleted').textContent = completed;
  document.getElementById('statPending').textContent = pending;
  const pct = total ? Math.round(completed / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${pct}% completed this week`;

  // Day tabs
  const tabsEl = document.getElementById('dayTabs');
  tabsEl.innerHTML = '';
  for (let d = 0; d < 7; d++) {
    const data = loadDayData(weekStart, d) || getDefaultDayData();
    const done = data.filter(t => t.done).length;
    const isToday = weekOffset === 0 && d === todayDayIdx;
    const isActive = d === selectedDayIndex;
    const fullyDone = done === TASKS.length;
    const tab = document.createElement('div');
    tab.className = `day-tab ${isActive ? 'active' : ''} ${isToday ? 'today' : ''} ${fullyDone ? 'fully-done' : ''}`;
    tab.innerHTML = `<span class="day-name">${WEEK_DAYS[d]}</span><span class="day-count">${done}/${TASKS.length}</span>`;
    tab.onclick = () => { selectedDayIndex = d; render(); };
    tabsEl.appendChild(tab);
  }

  // Selected day label
  const isViewingToday = weekOffset === 0 && selectedDayIndex === todayDayIdx;
  document.getElementById('selectedDayLabel').textContent =
    isViewingToday ? "Today's Sadhana" : `${WEEK_DAYS_FULL[selectedDayIndex]}'s Sadhana`;

  // Task list
  const taskListEl = document.getElementById('taskList');
  taskListEl.innerHTML = '';
  const dayData = loadDayData(weekStart, selectedDayIndex) || getDefaultDayData();
  const alarms = loadAlarmTimes();

  TASKS.forEach(task => {
    const state = dayData.find(t => t.id === task.id) || { id: task.id, done: false };
    const alarmTime = alarms[task.id] || task.defaultTime;
    const card = document.createElement('div');
    card.className = `task-card ${state.done ? 'done' : ''}`;
    card.innerHTML = `
      <span class="task-emoji">${task.emoji}</span>
      <div class="task-info">
        <div class="task-name">${task.name}</div>
        <div class="task-meta">
          <span style="color:var(--smoke);font-size:0.72rem;">⏰</span>
          <input class="task-time-input" type="time" value="${alarmTime}"
            title="Set reminder time"
            onchange="updateAlarmTime(${task.id}, this.value)"
            onclick="event.stopPropagation()" />
          <span class="alarm-badge" id="alarm-badge-${task.id}" style="${alarmTime ? '' : 'display:none'}">Reminder set</span>
        </div>
      </div>
      <div class="task-checkbox">${state.done ? '✓' : ''}</div>
    `;
    card.onclick = () => toggleTask(task.id);
    taskListEl.appendChild(card);
  });
}

// ── INTERACTIONS ────────────────────────────────────────────────────────────
function toggleTask(taskId) {
  const weekStart = getWeekStart(weekOffset);
  const dayData = loadDayData(weekStart, selectedDayIndex) || getDefaultDayData();
  const task = dayData.find(t => t.id === taskId);
  if (task) task.done = !task.done;
  saveDayData(weekStart, selectedDayIndex, dayData);
  const taskName = TASKS.find(t => t.id === taskId)?.name || '';
  showToast(task.done ? `✓ ${taskName} completed 🙏` : `↺ Marked as pending`);
  render();
}

function markAllDone() {
  const weekStart = getWeekStart(weekOffset);
  const dayData = getDefaultDayData().map(t => ({ ...t, done: true }));
  saveDayData(weekStart, selectedDayIndex, dayData);
  showToast('🕉️ All practices completed for today!');
  render();
}

function resetDay() {
  if (!confirm('Reset all tasks for this day?')) return;
  const weekStart = getWeekStart(weekOffset);
  saveDayData(weekStart, selectedDayIndex, getDefaultDayData());
  showToast('↺ Day reset');
  render();
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

// Alarm time
function updateAlarmTime(taskId, timeValue) {
  const alarms = loadAlarmTimes();
  alarms[taskId] = timeValue;
  saveAlarmTimes(alarms);
  showToast(`🔔 Reminder set for ${timeValue}`);
  render();
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
let modalTaskId = null;
function openModal(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  const alarms = loadAlarmTimes();
  document.getElementById('modalTaskName').textContent = `🔔 ${task.name}`;
  document.getElementById('modalTimeInput').value = alarms[taskId] || task.defaultTime;
  modalTaskId = taskId;
  document.getElementById('alarmModal').classList.add('open');
}

function closeModal() {
  document.getElementById('alarmModal').classList.remove('open');
  modalTaskId = null;
}

function saveAlarmTime() {
  if (!modalTaskId) return;
  const time = document.getElementById('modalTimeInput').value;
  const alarms = loadAlarmTimes();
  alarms[modalTaskId] = time;
  saveAlarmTimes(alarms);
  showToast(`🔔 Reminder set for ${time}`);
  closeModal();
  render();
}

// ── INIT ───────────────────────────────────────────────────────────────────
// Pre-populate default alarm times if not set
const alarms = loadAlarmTimes();
let changed = false;
TASKS.forEach(t => {
  if (!alarms[t.id]) { alarms[t.id] = t.defaultTime; changed = true; }
});
if (changed) saveAlarmTimes(alarms);

render();
</script>
</body>
</html>
